<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Peachtree · Meeting Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RESET & TOKENS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
:root {
  --black:    #000000;
  --iron-ore: #222422;
  --ivory:    #F5F4EF;
  --white:    #FFFFFF;
 
  /* Geometry */
  --radius-sm:  8px;
  --radius-md:  14px;
  --radius-lg:  20px;
  --radius-xl:  28px;
 
  /* Motion */
  --ease-out:   cubic-bezier(0.22, 1, 0.36, 1);
  --ease-spring:cubic-bezier(0.34, 1.56, 0.64, 1);
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LIGHT THEME
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
[data-theme="light"] {
  --bg:          var(--ivory);
  --bg-raised:   var(--white);
  --bg-sunken:   #EDECE7;
  --bg-glass:    rgba(255,255,255,0.72);
  --surface:     var(--white);
  --border:      rgba(34,36,34,0.10);
  --border-mid:  rgba(34,36,34,0.18);
  --text-primary:   var(--iron-ore);
  --text-secondary: rgba(34,36,34,0.52);
  --text-tertiary:  rgba(34,36,34,0.35);
  --accent:      var(--iron-ore);
  --accent-text: var(--white);
  --shadow-xs:   0 1px 2px rgba(0,0,0,0.05);
  --shadow-sm:   0 2px 8px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.04);
  --shadow-md:   0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.05);
  --shadow-lg:   0 24px 64px rgba(0,0,0,0.14), 0 4px 16px rgba(0,0,0,0.06);
  --nav-bg:      rgba(245,244,239,0.82);
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   DARK THEME
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
[data-theme="dark"] {
  --bg:          #161816;
  --bg-raised:   #1F211F;
  --bg-sunken:   #111311;
  --bg-glass:    rgba(31,33,31,0.82);
  --surface:     #1F211F;
  --border:      rgba(245,244,239,0.08);
  --border-mid:  rgba(245,244,239,0.14);
  --text-primary:   var(--ivory);
  --text-secondary: rgba(245,244,239,0.50);
  --text-tertiary:  rgba(245,244,239,0.28);
  --accent:      var(--ivory);
  --accent-text: var(--iron-ore);
  --shadow-xs:   0 1px 2px rgba(0,0,0,0.30);
  --shadow-sm:   0 2px 8px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.04);
  --shadow-md:   0 8px 32px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.25);
  --shadow-lg:   0 24px 64px rgba(0,0,0,0.60), 0 4px 16px rgba(0,0,0,0.30);
  --nav-bg:      rgba(22,24,22,0.85);
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BASE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
html { -webkit-font-smoothing: antialiased; }
 
body {
  font-family: 'Geist', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  transition: background 0.4s var(--ease-out), color 0.4s var(--ease-out);
  overflow-x: hidden;
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   NAV BAR  — frosted glass, Apple-style
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
nav {
  position: sticky;
  top: 0;
  z-index: 200;
  height: 64px;
  display: flex;
  align-items: center;
  padding: 0 28px;
  background: var(--nav-bg);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  transition: background 0.4s var(--ease-out);
}
 
.nav-inner {
  width: 100%;
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
 
/* Wordmark */
.wordmark {
  display: flex;
  flex-direction: column;
  gap: 0px;
  line-height: 1;
}
.wordmark-top {
  font-family: 'Cormorant Garamond', serif;
  font-size: 19px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--text-primary);
  transition: color 0.4s;
}
.wordmark-sub {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  transition: color 0.4s;
}
 
/* Nav right controls */
.nav-controls {
  display: flex;
  align-items: center;
  gap: 10px;
}
 
/* Live pill */
.live-pill {
  display: none;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text-secondary);
  background: var(--bg-sunken);
  border: 1px solid var(--border);
  padding: 6px 12px;
  border-radius: 40px;
  transition: all 0.4s;
}
.live-pill.visible { display: flex; }
.live-dot {
  width: 7px; height: 7px;
  background: #34C759;
  border-radius: 50%;
  animation: breathe 2s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes breathe {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:0.4; transform:scale(0.7); }
}
 
/* Theme toggle — pill style */
.theme-toggle {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--bg-sunken);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 3px;
  cursor: pointer;
  transition: background 0.4s, border-color 0.4s;
}
.theme-option {
  font-size: 13px;
  padding: 5px 12px;
  border-radius: 30px;
  font-weight: 500;
  letter-spacing: 0.01em;
  color: var(--text-tertiary);
  transition: all 0.25s var(--ease-out);
  user-select: none;
  line-height: 1;
}
.theme-option.active {
  background: var(--surface);
  color: var(--text-primary);
  box-shadow: var(--shadow-sm);
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HERO  — shown when no content is loaded
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 24px;
  text-align: center;
  animation: fadeUp 0.6s var(--ease-out) both;
}
 
@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}
 
.hero-icon {
  width: 80px; height: 80px;
  background: var(--iron-ore);
  border-radius: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 28px;
  box-shadow: 0 12px 40px rgba(34,36,34,0.25);
  transition: background 0.4s, transform 0.3s var(--ease-spring);
}
[data-theme="dark"] .hero-icon {
  background: var(--bg-raised);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  border: 1px solid var(--border-mid);
}
.hero-icon:hover { transform: scale(1.06); }
 
.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(32px, 5vw, 48px);
  font-weight: 500;
  letter-spacing: 0.01em;
  line-height: 1.15;
  color: var(--text-primary);
  margin-bottom: 14px;
  transition: color 0.4s;
}
 
.hero-sub {
  font-size: 16px;
  font-weight: 400;
  color: var(--text-secondary);
  max-width: 360px;
  line-height: 1.7;
  transition: color 0.4s;
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   VIEWER  — shown when content is loaded
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.viewer-wrap {
  display: none;
  flex: 1;
  flex-direction: column;
  padding: 20px 20px 0;
  gap: 12px;
  max-width: 1200px;
  width: 100%;
  margin: 0 auto;
  animation: fadeUp 0.5s var(--ease-out) both;
}
 
.viewer-wrap.visible { display: flex; }
 
/* Document card */
.doc-card {
  background: var(--surface);
  border-radius: var(--radius-xl);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-md);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 520px;
  transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
}
 
/* Toolbar inside card */
.doc-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  height: 52px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-sunken);
  flex-shrink: 0;
  gap: 12px;
  transition: background 0.4s, border-color 0.4s;
}
 
.toolbar-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
 
.doc-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 4px 9px;
  border-radius: 5px;
  background: var(--iron-ore);
  color: var(--ivory);
  flex-shrink: 0;
  transition: background 0.4s;
}
[data-theme="dark"] .doc-badge { background: var(--ivory); color: var(--iron-ore); }
 
.doc-title-text {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.4s;
}
 
.doc-open-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-mid);
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.2s;
  background: var(--surface);
}
.doc-open-btn:hover {
  color: var(--text-primary);
  border-color: var(--border-mid);
  background: var(--bg-raised);
  transform: translateY(-1px);
  box-shadow: var(--shadow-xs);
}
 
.viewer-frame {
  flex: 1;
  width: 100%;
  border: none;
  min-height: 480px;
  display: block;
  background: var(--bg-sunken);
}
 
/* Meta strip */
.meta-strip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 14px 4px 18px;
  flex-wrap: wrap;
}
 
.meta-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-tertiary);
  padding: 5px 12px;
  border-radius: 40px;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-xs);
  transition: all 0.4s;
}
.meta-item strong { color: var(--text-secondary); font-weight: 500; }
 
.meta-note {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-secondary);
  font-style: italic;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 5px 14px;
  box-shadow: var(--shadow-xs);
  max-width: 300px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: all 0.4s;
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MODAL  — sheet style, Apple-inspired
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.40);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 400;
  align-items: flex-end;
  justify-content: center;
  padding: 0;
  transition: opacity 0.3s;
}
 
@media (min-width: 640px) {
  .modal-backdrop { align-items: center; padding: 20px; }
}
 
.modal-backdrop.open { display: flex; }
 
.modal {
  background: var(--bg-raised);
  width: 100%;
  max-width: 520px;
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  border-bottom: none;
  overflow: hidden;
  animation: sheetUp 0.38s var(--ease-out) both;
  transition: background 0.4s, border-color 0.4s;
}
 
@media (min-width: 640px) {
  .modal {
    border-radius: var(--radius-xl);
    border-bottom: 1px solid var(--border);
    animation: modalIn 0.32s var(--ease-out) both;
  }
}
 
@keyframes sheetUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
@keyframes modalIn {
  from { transform: translateY(16px) scale(0.97); opacity: 0; }
  to   { transform: translateY(0) scale(1); opacity: 1; }
}
 
/* Modal drag handle (mobile) */
.modal-handle {
  width: 36px; height: 4px;
  background: var(--border-mid);
  border-radius: 2px;
  margin: 12px auto 0;
  transition: background 0.4s;
}
 
@media (min-width: 640px) { .modal-handle { display: none; } }
 
/* Modal header */
.modal-header {
  padding: 20px 24px 0;
}
.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 0.01em;
  margin-bottom: 4px;
  transition: color 0.4s;
}
.modal-sub {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
  transition: color 0.4s;
}
 
/* Segment control — content type */
.segment {
  display: flex;
  background: var(--bg-sunken);
  border-radius: var(--radius-md);
  padding: 3px;
  gap: 2px;
  margin: 20px 24px 0;
  border: 1px solid var(--border);
}
.seg-btn {
  flex: 1;
  padding: 9px 8px;
  border: none;
  border-radius: var(--radius-sm);
  background: none;
  font-family: 'Geist', system-ui, sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--text-tertiary);
  cursor: pointer;
  transition: all 0.22s var(--ease-out);
}
.seg-btn.active {
  background: var(--surface);
  color: var(--text-primary);
  box-shadow: var(--shadow-sm);
}
 
/* Modal body */
.modal-body {
  padding: 20px 24px 0;
}
 
/* Field */
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 7px;
  transition: color 0.4s;
}
.field input,
.field textarea {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg-sunken);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  font-family: 'Geist', system-ui, sans-serif;
  font-size: 14px;
  color: var(--text-primary);
  outline: none;
  resize: none;
  transition: border-color 0.2s, background 0.4s, color 0.4s;
  -webkit-appearance: none;
}
.field input:focus,
.field textarea:focus {
  border-color: var(--border-mid);
  background: var(--surface);
}
.field-hint {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 6px;
  line-height: 1.6;
  transition: color 0.4s;
}
 
/* PDF drop zone */
.drop-zone {
  border: 1.5px dashed var(--border-mid);
  border-radius: var(--radius-md);
  padding: 28px 16px;
  text-align: center;
  position: relative;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.drop-zone:hover { border-color: var(--text-secondary); background: var(--bg-sunken); }
.drop-zone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.drop-zone-icon { font-size: 30px; display: block; margin-bottom: 8px; }
.drop-zone-label { font-size: 14px; font-weight: 500; color: var(--text-primary); display: block; margin-bottom: 2px; }
.drop-zone-sub { font-size: 12px; color: var(--text-tertiary); }
 
.pdf-chip {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg-sunken);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  margin-top: 10px;
}
.pdf-chip.visible { display: flex; }
.pdf-chip-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pdf-chip-clear {
  background: none; border: none; cursor: pointer;
  color: var(--text-tertiary); font-size: 18px; line-height: 1;
  padding: 2px 4px; border-radius: 4px;
  transition: color 0.2s;
  flex-shrink: 0;
}
.pdf-chip-clear:hover { color: #ff3b30; }
 
/* Modal footer */
.modal-footer {
  padding: 20px 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
@media (min-width: 640px) {
  .modal-footer { padding-bottom: 24px; }
}
 
.btn-publish {
  width: 100%;
  padding: 15px;
  background: var(--iron-ore);
  color: var(--ivory);
  border: none;
  border-radius: var(--radius-md);
  font-family: 'Geist', system-ui, sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.01em;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s var(--ease-spring), box-shadow 0.2s;
  box-shadow: 0 2px 12px rgba(34,36,34,0.30);
}
.btn-publish:hover { background: var(--black); box-shadow: 0 4px 20px rgba(0,0,0,0.25); }
.btn-publish:active { transform: scale(0.97); }
[data-theme="dark"] .btn-publish { background: var(--ivory); color: var(--iron-ore); box-shadow: 0 2px 12px rgba(0,0,0,0.40); }
[data-theme="dark"] .btn-publish:hover { background: var(--white); }
 
.btn-cancel {
  width: 100%;
  padding: 14px;
  background: none;
  border: 1.5px solid var(--border-mid);
  border-radius: var(--radius-md);
  font-family: 'Geist', system-ui, sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
}
.btn-cancel:hover { color: var(--text-primary); border-color: var(--border-mid); background: var(--bg-sunken); }
 
.btn-remove {
  width: 100%;
  padding: 12px;
  background: none;
  border: none;
  font-family: 'Geist', system-ui, sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-tertiary);
  cursor: pointer;
  transition: color 0.2s;
}
.btn-remove:hover { color: #ff3b30; }
 
 
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TOAST
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  opacity: 0;
  background: var(--iron-ore);
  color: var(--ivory);
  padding: 12px 22px;
  border-radius: 40px;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.02em;
  z-index: 500;
  white-space: nowrap;
  box-shadow: var(--shadow-md);
  transition: all 0.35s var(--ease-out);
  pointer-events: none;
}
[data-theme="dark"] .toast { background: var(--ivory); color: var(--iron-ore); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MOBILE TWEAKS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@media (max-width: 600px) {
  nav { padding: 0 18px; height: 58px; }
  .wordmark-sub { display: none; }
  .viewer-wrap { padding: 12px 12px 0; }
  .doc-card { min-height: 360px; border-radius: var(--radius-lg); }
  .viewer-frame { min-height: 320px; }
  .meta-note { display: none; }
  .fab { bottom: 20px; right: 16px; }
}
 
/* Safe area (iPhone notch) */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .modal-footer { padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
  .fab { bottom: calc(24px + env(safe-area-inset-bottom)); }
}
 
</style>
</head>
<body>
 
<!-- ══════════════════════════════════════════
     NAV
══════════════════════════════════════════ -->
<nav>
  <div class="nav-inner">
    <div class="wordmark">
      <div class="wordmark-top">Peachtree</div>
      <div class="wordmark-sub">Town &amp; Country</div>
    </div>
 
    <div class="nav-controls">
      <div class="live-pill" id="livePill">
        <div class="live-dot"></div>
        Live
      </div>
 
      <!-- Theme toggle -->
      <div class="theme-toggle" onclick="toggleTheme()" role="switch" aria-label="Toggle theme">
        <div class="theme-option" id="optLight">☀︎ Day</div>
        <div class="theme-option" id="optDark">◗ Night</div>
      </div>
    </div>
  </div>
</nav>
 
 
<!-- ══════════════════════════════════════════
     HERO (empty state)
══════════════════════════════════════════ -->
<div class="hero" id="hero">
  <div class="hero-icon">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <rect x="6" y="4" width="24" height="29" rx="3.5" stroke="#F5F4EF" stroke-width="1.8"/>
      <path d="M11 13h14M11 19h14M11 25h9" stroke="#F5F4EF" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </div>
  <h1 class="hero-title">No presentation<br>loaded yet.</h1>
  <p class="hero-sub">Your administrator will publish today's document here. Check back shortly or refresh the page.</p>
</div>
 
 
<!-- ══════════════════════════════════════════
     VIEWER (loaded state)
══════════════════════════════════════════ -->
<div class="viewer-wrap" id="viewerWrap">
  <div class="doc-card">
    <div class="doc-toolbar">
      <div class="toolbar-left">
        <div class="doc-badge" id="docBadge">Slides</div>
        <div class="doc-title-text" id="docTitleText">Today's Presentation</div>
      </div>
      <a href="#" id="docOpenLink" class="doc-open-btn" target="_blank">
        Open ↗
      </a>
    </div>
    <iframe class="viewer-frame" id="viewerFrame" allowfullscreen></iframe>
  </div>
 
  <div class="meta-strip" id="metaStrip">
    <div class="meta-item">📅 &thinsp;<strong id="metaDate">—</strong></div>
    <div class="meta-item">🕐 &thinsp;Updated <strong id="metaTime" style="margin-left:3px">—</strong></div>
    <div class="meta-note" id="metaNote" style="display:none"></div>
  </div>
</div>
 
 
<!-- Admin panel removed -->
 
 
 
<!-- Admin button removed — edit HARDCODED_LINK in code to update -->
 
<!-- Toast -->
<div class="toast" id="toast"></div>
 
 
<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CONFIGURATION
   ─────────────────────────────────────────────
   To hardcode a permanent link, paste it below.
   Leave as empty string '' to use the admin panel.
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const HARDCODED_LINK = 'https://drive.google.com/file/d/1dnv9ZBUDL3F7tVkVlQ_p2exVoBc8wOmg/view?usp=sharing';   // ← Google Drive link
const HARDCODED_TITLE = '';  // ← optional title
const HARDCODED_NOTE  = '';  // ← optional note for agents
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   STATE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const KEY = 'ptc_v2';
const THEME_KEY = 'ptc_theme';
let pdfData = null;
let seg = 'google';
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   THEME
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function initTheme() {
  const saved = localStorage.getItem(THEME_KEY)
    || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  setTheme(saved);
}
 
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  setTheme(cur === 'light' ? 'dark' : 'light');
}
 
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem(THEME_KEY, t);
  document.getElementById('optLight').classList.toggle('active', t === 'light');
  document.getElementById('optDark').classList.toggle('active', t === 'dark');
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   EMBED HELPERS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function embedUrl(url) {
  if (!url) return '';
  // Google Slides
  if (url.includes('docs.google.com/presentation'))
    return url.split('/edit')[0].split('/pub')[0].split('/preview')[0] + '/embed?start=false&loop=false&delayms=5000&rm=minimal';
  // Google Docs
  if (url.includes('docs.google.com/document'))
    return url.split('/edit')[0].split('/pub')[0] + '/preview';
  // Google Sheets
  if (url.includes('docs.google.com/spreadsheets'))
    return url.split('/edit')[0].split('/pub')[0] + '/preview';
  // Generic Google Drive file (PDF, DOCX, PPTX, XLSX, etc.)
  // Extract file ID and use Google Drive preview viewer
  const driveMatch = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (driveMatch) {
    const fileId = driveMatch[1];
    return 'https://drive.google.com/file/d/' + fileId + '/preview';
  }
  return url;
}
 
function docType(url, isPdf) {
  if (isPdf) return 'PDF';
  if (!url) return 'Doc';
  if (url.includes('/presentation')) return 'Slides';
  if (url.includes('/document'))     return 'Doc';
  if (url.includes('/spreadsheets')) return 'Sheet';
  if (url.includes('drive.google.com/file')) return 'File';
  return 'File';
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RENDER
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function render(data) {
  if (!data) return;
  const { url, pdfDataUrl, title, note, savedAt } = data;
  const isPdf = !!pdfDataUrl;
  const src   = isPdf ? pdfDataUrl : embedUrl(url);
 
  document.getElementById('hero').style.display       = 'none';
  document.getElementById('viewerWrap').classList.add('visible');
  document.getElementById('livePill').classList.add('visible');
 
  document.getElementById('viewerFrame').src     = src;
  document.getElementById('docBadge').textContent = docType(url, isPdf);
  document.getElementById('docTitleText').textContent = title || (isPdf ? 'Today\'s Document' : 'Today\'s Presentation');
 
  const link = document.getElementById('docOpenLink');
  link.href = isPdf ? pdfDataUrl : url;
  if (isPdf) { link.download = title || 'document.pdf'; link.textContent = 'Download ↓'; }
  else       { link.removeAttribute('download'); link.textContent = 'Open ↗'; }
 
  const d = new Date(savedAt);
  document.getElementById('metaDate').textContent = d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  document.getElementById('metaTime').textContent = d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
 
  const noteEl = document.getElementById('metaNote');
  if (note) { noteEl.textContent = '📝 ' + note; noteEl.style.display = ''; }
  else { noteEl.style.display = 'none'; }
}
 
function clearView() {
  document.getElementById('hero').style.display = '';
  document.getElementById('viewerWrap').classList.remove('visible');
  document.getElementById('livePill').classList.remove('visible');
  document.getElementById('viewerFrame').src = '';
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MODAL
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function openModal() {
  const raw = localStorage.getItem(KEY);
  const hasContent = !!raw;
  document.getElementById('removeBtn').style.display = hasContent ? '' : 'none';
 
  if (raw) {
    try {
      const d = JSON.parse(raw);
      document.getElementById('titleInput').value = d.title || '';
      document.getElementById('noteInput').value  = d.note  || '';
      if (d.pdfDataUrl) {
        switchSeg('pdf');
        pdfData = d.pdfDataUrl;
        document.getElementById('pdfChipName').textContent = d.title || 'Loaded PDF';
        document.getElementById('pdfChip').classList.add('visible');
        document.getElementById('dropZone').style.opacity = '0.5';
      } else {
        switchSeg('google');
        document.getElementById('linkInput').value = d.url || '';
      }
    } catch(e) {}
  }
 
  document.getElementById('modalBackdrop').classList.add('open');
}
 
function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
}
 
function switchSeg(s) {
  seg = s;
  document.getElementById('secGoogle').style.display = s === 'google' ? '' : 'none';
  document.getElementById('secPdf').style.display    = s === 'pdf'    ? '' : 'none';
  document.getElementById('segGoogle').classList.toggle('active', s === 'google');
  document.getElementById('segPdf').classList.toggle('active', s === 'pdf');
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PDF
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function onPdfSelect(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    pdfData = e.target.result;
    document.getElementById('pdfChipName').textContent = file.name;
    document.getElementById('pdfChip').classList.add('visible');
    document.getElementById('dropZone').style.opacity = '0.5';
  };
  reader.readAsDataURL(file);
}
 
function clearPdf() {
  pdfData = null;
  document.getElementById('pdfInput').value = '';
  document.getElementById('pdfChip').classList.remove('visible');
  document.getElementById('dropZone').style.opacity = '1';
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PUBLISH / REMOVE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function publish() {
  const title = document.getElementById('titleInput').value.trim();
  const note  = document.getElementById('noteInput').value.trim();
 
  if (seg === 'pdf') {
    if (!pdfData) { toast('Please select a PDF file'); return; }
    const data = { pdfDataUrl: pdfData, title, note, savedAt: new Date().toISOString() };
    localStorage.setItem(KEY, JSON.stringify(data));
    render(data);
    closeModal();
    toast('PDF published');
  } else {
    const url = document.getElementById('linkInput').value.trim();
    if (!url) { toast('Please paste a Google Drive link'); return; }
    if (!url.includes('docs.google.com') && !url.includes('drive.google.com')) { toast('Please use a Google Drive link'); return; }
    const data = { url, title, note, savedAt: new Date().toISOString() };
    localStorage.setItem(KEY, JSON.stringify(data));
    render(data);
    closeModal();
    toast('Presentation published');
  }
}
 
function removeContent() {
  if (!confirm('Remove the current document?')) return;
  localStorage.removeItem(KEY);
  clearView();
  closeModal();
  toast('Document removed');
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TOAST
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}
 
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   INIT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
// Admin modal removed
 
initTheme();
 
// If a hardcoded link is set, always use it
if (HARDCODED_LINK) {
  render({
    url: HARDCODED_LINK,
    title: HARDCODED_TITLE,
    note: HARDCODED_NOTE,
    savedAt: new Date().toISOString()
  });
} else {
  // Otherwise load from localStorage
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) render(JSON.parse(raw));
  } catch(e) {}
}
 
// Auto-refresh every 60s
setInterval(() => {
  if (HARDCODED_LINK) return;
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) render(JSON.parse(raw));
  } catch(e) {}
}, 60000);
</script>
</body>
